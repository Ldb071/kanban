<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raona · Tareas por cliente</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --raona-black: #f4f5f7;
  --raona-dark: #ffffff;
  --raona-card: #ffffff;
  --raona-border: #e0e0e0;
  --raona-green: #7ac143;
  --raona-green-dark: #5d9a2e;
  --raona-text: #1a1a1a;
  --raona-muted: #666;
  --raona-subtle: #aaa;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--raona-black); color: var(--raona-text); min-height: 100vh; }

/* HEADER */
header { background: #ffffff; border-bottom: 1px solid #e0e0e0; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 64px; }
header img { height: 28px; }
.header-title { font-size: 13px; color: var(--raona-muted); letter-spacing: 0.05em; text-transform: uppercase; }

/* MAIN */
main { max-width: 960px; margin: 0 auto; padding: 32px 24px; }

.top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.top-bar h1 { font-size: 22px; font-weight: 600; color: var(--raona-text); }
.count-tag { background: var(--raona-card); border: 1px solid var(--raona-border); color: var(--raona-muted); font-size: 12px; padding: 3px 12px; border-radius: 99px; }

/* FILTER */
.filter-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
.filter-bar span { font-size: 12px; color: var(--raona-muted); margin-right: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
.filter-btn { border: 1px solid var(--raona-border); background: var(--raona-card); border-radius: 99px; padding: 5px 18px; font-size: 13px; cursor: pointer; color: var(--raona-muted); transition: all 0.15s; }
.filter-btn:hover { border-color: var(--raona-green); color: var(--raona-green); }
.filter-btn.active.all { background: var(--raona-green); border-color: var(--raona-green); color: #000; font-weight: 600; }
.filter-btn.active.alta { background: #c0392b; border-color: #c0392b; color: #fff; font-weight: 600; }
.filter-btn.active.media { background: #e67e22; border-color: #e67e22; color: #fff; font-weight: 600; }
.filter-btn.active.baja { background: var(--raona-green); border-color: var(--raona-green); color: #000; font-weight: 600; }

/* GLOBAL ADD FORM */
.global-add { background: var(--raona-card); border: 1px solid var(--raona-border); border-radius: 12px; padding: 16px; margin-bottom: 28px; display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; align-items: end; }
.field label { display: block; font-size: 11px; color: var(--raona-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
.global-add input, .global-add select { width: 100%; background: var(--raona-dark); border: 1px solid var(--raona-border); border-radius: 8px; padding: 8px 12px; font-size: 14px; color: var(--raona-text); }
.global-add input:focus, .global-add select:focus { outline: none; border-color: var(--raona-green); }
.global-add select option { background: var(--raona-dark); }
.add-btn-global { height: 38px; padding: 0 20px; background: var(--raona-green); color: #000; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
.add-btn-global:hover { background: var(--raona-green-dark); color: #fff; }
.add-btn-global:disabled { opacity: 0.4; cursor: not-allowed; }

/* CLIENT BLOCK */
.client-block { background: var(--raona-card); border: 1px solid var(--raona-border); border-radius: 14px; padding: 20px 22px; margin-bottom: 16px; }
.client-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.client-title { font-size: 20px; font-weight: 600; color: var(--raona-text); }
.client-title-right { display: flex; align-items: center; gap: 10px; }
.progress-badge { font-size: 12px; color: var(--raona-muted); background: var(--raona-dark); border: 1px solid var(--raona-border); border-radius: 99px; padding: 2px 12px; }
.add-task-btn { background: none; border: 1px solid var(--raona-border); border-radius: 8px; padding: 5px 14px; font-size: 12px; color: var(--raona-muted); cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.add-task-btn:hover { border-color: var(--raona-green); color: var(--raona-green); }

/* INLINE FORM */
.inline-form { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; align-items: center; background: var(--raona-dark); border: 1px solid var(--raona-border); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; }
.inline-form input, .inline-form select { background: var(--raona-card); border: 1px solid var(--raona-border); border-radius: 7px; padding: 7px 10px; font-size: 13px; color: var(--raona-text); }
.inline-form input:focus, .inline-form select:focus { outline: none; border-color: var(--raona-green); }
.inline-form select option { background: var(--raona-dark); }
.inline-actions { display: flex; gap: 6px; }
.btn-save { background: var(--raona-green); color: #000; border: none; border-radius: 7px; padding: 7px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-save:hover { background: var(--raona-green-dark); color: #fff; }
.btn-cancel { background: none; border: 1px solid var(--raona-border); border-radius: 7px; padding: 7px 10px; font-size: 13px; cursor: pointer; color: var(--raona-muted); }
.btn-cancel:hover { border-color: var(--raona-subtle); color: var(--raona-text); }

/* TASK ROW */
.task-row { display: flex; align-items: center; gap: 12px; border: 1px solid var(--raona-border); border-radius: 10px; padding: 13px 16px; margin-bottom: 8px; background: var(--raona-dark); transition: border-color 0.15s; }
.task-row:hover { border-color: var(--raona-subtle); }
.task-check { width: 20px; height: 20px; border: 1.5px solid var(--raona-subtle); border-radius: 5px; flex-shrink: 0; cursor: pointer; background: transparent; transition: all 0.15s; }
.task-check:hover { border-color: var(--raona-green); background: rgba(122,193,67,0.1); }
.task-text { flex: 1; font-size: 14px; line-height: 1.45; color: var(--raona-text); }
.prio-pill { font-size: 11px; padding: 3px 12px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; font-weight: 500; }
.pill-alta { background: rgba(192,57,43,0.2); color: #e74c3c; border: 1px solid rgba(192,57,43,0.3); }
.pill-media { background: rgba(230,126,34,0.15); color: #e67e22; border: 1px solid rgba(230,126,34,0.3); }
.pill-baja { background: rgba(122,193,67,0.15); color: var(--raona-green); border: 1px solid rgba(122,193,67,0.3); }
.del-btn { background: none; border: none; cursor: pointer; color: var(--raona-subtle); padding: 3px 5px; border-radius: 5px; font-size: 15px; flex-shrink: 0; transition: all 0.15s; }
.del-btn:hover { color: #e74c3c; background: rgba(192,57,43,0.1); }

/* FOOTER */
.footer-row { display: flex; justify-content: flex-end; margin-top: 8px; }
.ghost-btn { background: none; border: none; cursor: pointer; font-size: 12px; color: var(--raona-muted); padding: 4px 10px; border-radius: 8px; }
.ghost-btn:hover { background: var(--raona-card); color: var(--raona-text); }

/* DONE */
.done-block { margin-top: 28px; border-top: 1px solid var(--raona-border); padding-top: 20px; }
.done-block-title { font-size: 12px; font-weight: 600; color: var(--raona-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
.done-row { display: flex; align-items: center; gap: 12px; background: var(--raona-dark); border: 1px solid var(--raona-border); border-radius: 10px; padding: 10px 16px; margin-bottom: 6px; opacity: 0.5; }
.done-row .task-text { text-decoration: line-through; color: var(--raona-muted); }
.done-cliente-tag { font-size: 11px; color: var(--raona-subtle); white-space: nowrap; }

/* MISC */
.empty-state { text-align: center; padding: 56px 0; color: var(--raona-muted); font-size: 14px; }
.status-bar { font-size: 12px; color: var(--raona-muted); margin-bottom: 12px; min-height: 18px; }
.status-bar.error { color: #e74c3c; }
.status-bar.ok { color: var(--raona-green); }

@media (max-width: 600px) { .global-add { grid-template-columns: 1fr 1fr; } .inline-form { grid-template-columns: 1fr; } }
</style>
</head>

<script>
const SUPABASE_URL = 'https://kiqiaxqggxbvxjjtzlbg.supabase.co';
const SUPABASE_KEY = 'sb_publishable_YeCmBrQz-9SyGx-oASOuNg_DwpKMden';
const API = SUPABASE_URL + '/rest/v1/tareas';
const HEADERS = {
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

const INITIAL_TASKS = [
  { cliente: "Caja de Ingenieros", tarea: "Enviar la propuesta de GitHub.", prio: "alta", done: false },
  { cliente: "Caja de Ingenieros", tarea: "Seguimiento de la propuesta de bolsa de horas de Azure.", prio: "alta", done: false },
  { cliente: "Caja de Ingenieros", tarea: "Firma digital, adenda, adopción Microsoft 365.", prio: "alta", done: false },
  { cliente: "Caja de Ingenieros", tarea: "Toni: firma de adenda intranet.", prio: "media", done: false },
  { cliente: "Banco de Sabadell",  tarea: "Seguimiento del contrato de extensión de Carles.", prio: "alta", done: false },
  { cliente: "La Salle",           tarea: "Hacer seguimiento o reunión Gobierno de Datos.", prio: "baja", done: false },
  { cliente: "Omron",              tarea: "Preparar y presentar la propuesta para los RFFs de I+D.", prio: "alta", done: false },
  { cliente: "Omron",              tarea: "Quedar para mostrarles los agentes integrados con ATC Visits y con Skills App.", prio: "alta", done: false },
  { cliente: "Omron",              tarea: "Ofrecerles una sesión gratuita de Copilot.", prio: "baja", done: false },
  { cliente: "Mediapro",           tarea: "Hacer seguimiento de la propuesta de Briefcase.", prio: "media", done: false },
  { cliente: "Esade",              tarea: "Seguimiento Briefcase.", prio: "media", done: false }
];

let tasks = [], showDone = false, openForms = {}, activeFilter = 'all';

function setStatus(msg, type) {
  const bar = document.getElementById('status-bar');
  bar.textContent = msg;
  bar.className = 'status-bar' + (type ? ' ' + type : '');
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn.' + (f === 'all' ? 'all' : f)).classList.add('active');
  render();
}

async function fetchTasks() {
  try {
    const res = await fetch(API + '?order=id.asc', { headers: HEADERS });
    if (!res.ok) throw new Error(await res.text());
    tasks = await res.json();
    if (tasks.length === 0) {
      setStatus('Cargando tareas iniciales...', '');
      const res2 = await fetch(API, { method: 'POST', headers: HEADERS, body: JSON.stringify(INITIAL_TASKS) });
      if (!res2.ok) throw new Error(await res2.text());
      tasks = await res2.json();
    }
    setStatus(''); render();
  } catch(e) {
    setStatus('Error al cargar: ' + e.message, 'error');
    document.getElementById('board').innerHTML = '<div class="empty-state">❌ No se pudieron cargar las tareas.</div>';
  }
}

async function _saveTask(cliente, tarea, prio) {
  setStatus('Guardando...', '');
  try {
    const res = await fetch(API, { method: 'POST', headers: HEADERS, body: JSON.stringify({ cliente, tarea, prio, done: false }) });
    if (!res.ok) throw new Error(await res.text());
    const [t] = await res.json();
    tasks.push(t);
    delete openForms[cliente];
    setStatus('Tarea añadida ✓', 'ok');
    setTimeout(() => setStatus(''), 2000);
    render();
  } catch(e) { setStatus('Error: ' + e.message, 'error'); }
}

function addGlobalTask() {
  const cliente = document.getElementById('inp-cliente').value.trim();
  const tarea = document.getElementById('inp-tarea').value.trim();
  const prio = document.getElementById('inp-prio').value;
  if (!cliente || !tarea) return;
  document.getElementById('inp-tarea').value = '';
  _saveTask(cliente, tarea, prio);
}

function addTaskInline(cliente, safeId) {
  const tarea = document.getElementById('inline-tarea-' + safeId).value.trim();
  const prio = document.getElementById('inline-prio-' + safeId).value;
  if (!tarea) return;
  _saveTask(cliente, tarea, prio);
}

async function completeTask(id) {
  try {
    const res = await fetch(API + '?id=eq.' + id, { method: 'PATCH', headers: HEADERS, body: JSON.stringify({ done: true }) });
    if (!res.ok) throw new Error(await res.text());
    const t = tasks.find(t => t.id === id);
    if (t) t.done = true;
    render();
  } catch(e) { setStatus('Error: ' + e.message, 'error'); }
}

async function removeTask(id) {
  try {
    const res = await fetch(API + '?id=eq.' + id, { method: 'DELETE', headers: { ...HEADERS, 'Prefer': 'return=minimal' } });
    if (!res.ok) throw new Error(await res.text());
    tasks = tasks.filter(t => t.id !== id);
    render();
  } catch(e) { setStatus('Error: ' + e.message, 'error'); }
}

function toggleInlineForm(cliente) {
  if (openForms[cliente]) delete openForms[cliente]; else openForms[cliente] = true;
  render();
}

function toggleDone() {
  showDone = !showDone;
  document.getElementById('toggle-done-btn').textContent = showDone ? '🙈 Ocultar completadas' : '👁 Ver completadas';
  render();
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
const PRIO_LABEL = { alta: 'Prioritaria', media: 'Media', baja: 'Baja' };

function render() {
  const allPending = tasks.filter(t => !t.done);
  const done = tasks.filter(t => t.done);
  const filtered = activeFilter === 'all' ? allPending : allPending.filter(t => t.prio === activeFilter);
  const board = document.getElementById('board');
  const btn = document.getElementById('toggle-done-btn');

  document.getElementById('total-badge').textContent = allPending.length + (allPending.length === 1 ? ' pendiente' : ' pendientes');
  btn.style.display = done.length === 0 ? 'none' : '';

  if (filtered.length === 0) {
    board.innerHTML = '<div class="empty-state">' + (activeFilter === 'all' ? '✅ Sin tareas pendientes. ¡Todo al día!' : 'No hay tareas con esta prioridad.') + '</div>';
  } else {
    const byClient = {};
    const prioOrder = { alta: 0, media: 1, baja: 2 };
    filtered.forEach(t => { if (!byClient[t.cliente]) byClient[t.cliente] = []; byClient[t.cliente].push(t); });
    Object.values(byClient).forEach(arr => arr.sort((a,b) => prioOrder[a.prio] - prioOrder[b.prio]));

    board.innerHTML = Object.entries(byClient).map(([cliente, ctasks]) => {
      const safeId = cliente.replace(/[^a-zA-Z0-9]/g, '_');
      const rows = ctasks.map(t => `
        <div class="task-row">
          <div class="task-check" title="Marcar como completada" onclick="completeTask(${t.id})"></div>
          <span class="task-text">${esc(t.tarea)}</span>
          <span class="prio-pill pill-${t.prio}">${PRIO_LABEL[t.prio]}</span>
          <button class="del-btn" title="Eliminar" onclick="removeTask(${t.id})">✕</button>
        </div>`).join('');
      const inlineForm = openForms[cliente] ? `
        <div class="inline-form">
          <input type="text" id="inline-tarea-${safeId}" placeholder="Nueva tarea..." onkeydown="if(event.key==='Enter') addTaskInline('${esc(cliente)}','${safeId}')" />
          <select id="inline-prio-${safeId}"><option value="alta">Alta</option><option value="media" selected>Media</option><option value="baja">Baja</option></select>
          <div class="inline-actions">
            <button class="btn-save" onclick="addTaskInline('${esc(cliente)}','${safeId}')">Guardar</button>
            <button class="btn-cancel" onclick="toggleInlineForm('${esc(cliente)}')">✕</button>
          </div>
        </div>` : '';
      return `<div class="client-block">
        <div class="client-title-row">
          <span class="client-title">${esc(cliente)}</span>
          <div class="client-title-right">
            <button class="add-task-btn" onclick="toggleInlineForm('${esc(cliente)}')">+ Añadir tarea</button>
            <span class="progress-badge">0/${ctasks.length}</span>
          </div>
        </div>
        ${inlineForm}${rows}
      </div>`;
    }).join('');
  }

  const doneSection = document.getElementById('done-section');
  if (showDone && done.length > 0) {
    doneSection.innerHTML = `<div class="done-block">
      <div class="done-block-title">✓ Completadas (${done.length})</div>
      ${done.map(t => `<div class="done-row">
        <span style="color:var(--raona-green);font-size:14px;flex-shrink:0">✓</span>
        <span class="task-text">${esc(t.tarea)}</span>
        <span class="done-cliente-tag">${esc(t.cliente)}</span>
        <button class="del-btn" onclick="removeTask(${t.id})">✕</button>
      </div>`).join('')}
    </div>`;
  } else { doneSection.innerHTML = ''; }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && ['inp-tarea','inp-cliente'].includes(document.activeElement.id)) addGlobalTask();
});

fetchTasks();
</script>
</body>
</html>
